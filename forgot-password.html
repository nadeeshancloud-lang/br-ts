<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Recovery | KN Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="auth-body">

    <div class="absolute-orbs">
        <div class="orb orb-cyan"></div>
        <div class="orb orb-purple"></div>
    </div>

    <div class="login-card-container">
        <div class="login-card">
            <div class="logo-area">
                <div class="brand-logo">KN</div>
            </div>
            
            <h2>Reset Encryption Key</h2>
            <p class="subtitle">Enter your registered email to receive a decryption bypass link.</p>

            <form id="recoveryForm" class="space-y-5">
                <div class="input-group">
                    <label>Identity Email</label>
                    <input type="email" id="recoveryEmail" placeholder="admin@system.com" required>
                </div>

                <div id="errorMessage" class="error-msg" style="display: none;"></div>
                <div id="successMessage" class="success-msg" style="display: none;"></div>

                <button type="submit" id="submitBtn">Send Recovery Stream</button>
            </form>
            
            <p class="signup-redirect">
                Remembered your key? <a href="login.html">Return to Terminal</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // ඔයාගේ Firebase Web Config දත්ත මෙතනට ඇතුළත් කරන්න
const firebaseConfig = {
  apiKey: "AIzaSyDD8Bo2zmWrtrg-8RVeQGGEMrhCb18h9Hs",
  authDomain: "amilakanishkanet.firebaseapp.com",
  projectId: "amilakanishkanet",
  storageBucket: "amilakanishkanet.firebasestorage.app",
  messagingSenderId: "954519402127",
  appId: "1:954519402127:web:4eda1187cdc17ad07262fa"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const recoveryForm = document.getElementById('recoveryForm');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const submitBtn = document.getElementById('submitBtn');

        recoveryForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // කලින් තිබූ Alerts මකා දැමීම
            errorDiv.style.display = "none";
            successDiv.style.display = "none";

            const email = document.getElementById('recoveryEmail').value;

            submitBtn.innerText = "Broadcasting Request...";
            submitBtn.disabled = true;

            try {
                // Firebase මඟින් Password Reset Email එක යැවීම
                await sendPasswordResetEmail(auth, email);
                
                // සාර්ථක පණිවිඩය පෙන්වීම
                successDiv.innerText = "Recovery link dispatched. Check your transmission inbox (Email).";
                successDiv.style.display = "block";
                submitBtn.innerText = "Transmission Sent";
                
                // තත්පර 3කට පසු නැවත ලොගින් පිටුවට හරවා යැවීම
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 3500);

            } catch (err) {
                // වැරදීමක් සිදුවුවහොත් එය පෙන්වීම
                errorDiv.innerText = err.message.replace('Firebase: ', '');
                errorDiv.style.display = "block";
                submitBtn.innerText = "Send Recovery Stream";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
